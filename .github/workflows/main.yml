name: My First CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print message
        run: echo "Pipeline is running!"

      - name: Show date
        run: date

      - name: List files
        run: ls -la

      - name: Done
        run: echo "Pipeline completed successfully!"
